name: API 自动化测试

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 启动接口服务
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: 运行 API 测试
        run: python api_test.py